cat > index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/mia-15/">
  <title>Redirigiendo a invitación de Mía...</title>
  <style>
    body { 
      background: #faf0e9; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      color: #b28b7a;
      text-align: center;
    }
    .mensaje {
      animation: fadeIn 1.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    a {
      color: #c9a88b;
      text-decoration: none;
      border-bottom: 1px dotted #c9a88b;
    }
    a:hover {
      color: #b28b7a;
    }
  </style>
</head>
<body>
  <div class="mensaje">
    <h2>✨ Redirigiendo a la invitación de Mía...</h2>
    <p>Si no eres redirigido automáticamente, <a href="/Mia-15/">haz click aquí</a></p>
  </div>

</html>
EOF
